version: '3.8'

services:
  universal-clipboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: universal-clipboard:latest
    container_name: universal-clipboard
    ports:
      - "3847:3847"
    volumes:
      - clipboard-data:/app/backend/data
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - PORT=3847
      # Optional: Override auto-detected IP if entrypoint fails.
      # Create a .env file next to docker-compose.yml with:
      #   HOST_IP=192.168.x.x
      - HOST_IP=${HOST_IP:-}

volumes:
  clipboard-data:
